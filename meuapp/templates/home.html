<!---
     Template adaptado para herdar base.html
-->
{% extends 'base.html' %}

{% block content %}

    <h1>Olá, {{nome}}! {{mensagem}}</h1>
    {% if mensagem == 'Bom dia!' %}
        <p>Que tal um café?</p>
    {% elif mensagem == 'Boa tarde!' %}
        <p>Que tal uma água gelada?</p>
    {% else %}
        <p>Durma bem!</p>
    {% endif %}

{% endblock %}
